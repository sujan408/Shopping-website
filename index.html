<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sujan's Store</title>

<style>
:root{
  --bg:#f6f7fb; --card:#ffffff; --accent:#7c5cff; --muted:#7b7f93;
}
*{box-sizing:border-box}
body{
  margin:0; font-family:Arial;
  background:var(--bg);
  padding:20px;
}

/* DARK MODE */
body.dark{
  background:#0f172a;
  color:#e5e7eb;
}
body.dark .card, 
body.dark .cart{
  background:#1e293b;
  color:white;
}

/* LAYOUT */
.app{
  display:grid;
  grid-template-columns: 1fr 350px;
  gap:20px;
}

/* PRODUCT */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
}
.card{
  background:var(--card);
  padding:10px;
  border-radius:10px;
}
.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

/* CART */
.cart{
  background:white;
  padding:15px;
  border-radius:10px;
}

/* BUTTON */
.btn{
  padding:6px 10px;
  border:none;
  background:#eee;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

<!-- PRODUCTS -->
<div>
  <h2>Sujan's Store 🛒</h2>

  <!-- DARK MODE BUTTON -->
  <button class="btn" onclick="toggleDark()">🌙 Dark Mode</button>

  <div class="grid" id="products"></div>
</div>

<!-- CART -->
<div class="cart">
  <h3>Cart</h3>
  <div id="cart"></div>
  <h3 id="total">₹0</h3>
  <button class="btn" onclick="checkout()">Checkout</button>
</div>

</div>

<script>

// PRODUCTS
const PRODUCTS = [
{id:1,title:'T-Shirt',price:399,img:'https://images.unsplash.com/photo-1520975919210'},
{id:2,title:'Headphone',price:4999,img:'https://images.unsplash.com/photo-1518441902116'},
{id:3,title:'Shoes',price:1999,img:'https://images.unsplash.com/photo-1517949908113'}
];

// STATE
let cart = JSON.parse(localStorage.getItem('cart')||'{}');
let wishlist = JSON.parse(localStorage.getItem('wishlist')||'[]');
let dark = JSON.parse(localStorage.getItem('dark')||'false');

if(dark) document.body.classList.add('dark');

// FUNCTIONS

function toggleDark(){
  dark=!dark;
  localStorage.setItem('dark',JSON.stringify(dark));
  document.body.classList.toggle('dark');
}

function addToCart(id){
  cart[id]=(cart[id]||0)+1;
  saveCart();
}

function saveCart(){
  localStorage.setItem('cart',JSON.stringify(cart));
  renderCart();
}

function toggleWishlist(id){
  if(wishlist.includes(id)){
    wishlist=wishlist.filter(x=>x!==id);
  } else {
    wishlist.push(id);
  }
  localStorage.setItem('wishlist',JSON.stringify(wishlist));
  renderProducts();
}

// RENDER PRODUCTS
function renderProducts(){
  let html='';
  PRODUCTS.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.img}">
      <h4>${p.title}</h4>
      <p>₹${p.price}</p>
      <p>⭐⭐⭐⭐☆</p>
      <button class="btn" onclick="addToCart(${p.id})">Add</button>
      <button class="btn" onclick="toggleWishlist(${p.id})">
        ${wishlist.includes(p.id)?'❤️':'🤍'}
      </button>
    </div>
    `;
  });
  document.getElementById('products').innerHTML=html;
}

// RENDER CART
function renderCart(){
  let html='';
  let total=0;

  for(let id in cart){
    let p=PRODUCTS.find(x=>x.id==id);
    let qty=cart[id];
    total+=p.price*qty;

    html+=`
    <div>
      ${p.title} x ${qty}
      <button onclick="cart[${id}]--; if(cart[${id}]<=0) delete cart[${id}]; saveCart()">-</button>
    </div>
    `;
  }

  document.getElementById('cart').innerHTML=html;
  document.getElementById('total').innerText='₹'+total;
}

// CHECKOUT
function checkout(){
  if(Object.keys(cart).length===0){
    alert('Cart empty!');
    return;
  }

  let orderId=Math.floor(Math.random()*100000);

  document.body.innerHTML=`
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column">
      <h1>🎉 Order Successful</h1>
      <p>Order ID: #${orderId}</p>
      <button onclick="location.reload()">Back</button>
    </div>
  `;
}

// INIT
renderProducts();
renderCart();

</script>

</body>
</html>
