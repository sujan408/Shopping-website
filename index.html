<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Minimal Shop — Demo</title>

<style>
:root{
  --bg:#f6f7fb; --card:#ffffff; --accent:#7c5cff; --muted:#7b7f93;
  --glass: rgba(255,255,255,0.6);
  font-family: Inter, ui-sans-serif, system-ui;
  --radius:12px;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:linear-gradient(180deg,var(--bg),#eef2ff 60%);
  padding:32px;
  display:flex;
  justify-content:center;
}

/* DARK MODE */
body.dark{
  background:#0f172a !important;
  color:white;
}
body.dark .card,
body.dark .cart,
body.dark .search{
  background:#1e293b !important;
  color:white;
}

/* layout */
.app{
  width:100%;
  max-width:1200px;
  display:grid;
  grid-template-columns:1fr 360px;
  gap:20px;
}

/* product */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
  gap:15px;
}
.card{
  background:white;
  padding:10px;
  border-radius:10px;
}
.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.btn{
  padding:6px 10px;
  border:none;
  background:#eee;
  border-radius:6px;
  cursor:pointer;
}

/* cart */
.cart{
  background:white;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="app">

<div>
<h2>Sujan's Store 🛒</h2>

<button class="btn" onclick="toggleDark()">🌙 Dark</button>

<div class="grid" id="productGrid"></div>
</div>

<div class="cart">
<h3>Cart</h3>
<div id="cartList"></div>
<h3 id="subtotal">₹0</h3>
<button class="btn" id="checkoutBtn">Checkout</button>
</div>

</div>

<script>

// PRODUCTS
const PRODUCTS = [
{id:1,title:'T-Shirt',price:399,img:'https://images.unsplash.com/photo-1520975919210'},
{id:2,title:'Headphone',price:4999,img:'https://images.unsplash.com/photo-1518441902116'},
{id:3,title:'Shoes',price:1999,img:'https://images.unsplash.com/photo-1517949908113'}
];

// STATE
let state = {
  products: PRODUCTS,
  cart: JSON.parse(localStorage.getItem('cart')||'{}'),
  wishlist: JSON.parse(localStorage.getItem('wishlist')||'[]'),
  darkMode: JSON.parse(localStorage.getItem('darkMode')||'false')
};

if(state.darkMode) document.body.classList.add('dark');

// FUNCTIONS

function toggleDark(){
  state.darkMode=!state.darkMode;
  localStorage.setItem('darkMode',JSON.stringify(state.darkMode));
  document.body.classList.toggle('dark');
}

function addToCart(id){
  state.cart[id]=(state.cart[id]||0)+1;
  saveCart();
}

function saveCart(){
  localStorage.setItem('cart',JSON.stringify(state.cart));
  renderCart();
}

function toggleWishlist(id){
  if(state.wishlist.includes(id)){
    state.wishlist=state.wishlist.filter(x=>x!==id);
  } else {
    state.wishlist.push(id);
  }
  localStorage.setItem('wishlist',JSON.stringify(state.wishlist));
  renderProducts();
}

// RENDER PRODUCTS
function renderProducts(){
  let html='';
  state.products.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.img}">
      <h4>${p.title}</h4>
      <p>⭐⭐⭐⭐☆</p>
      <p>₹${p.price}</p>
      <button class="btn" onclick="addToCart(${p.id})">Add</button>
      <button class="btn" onclick="toggleWishlist(${p.id})">
        ${state.wishlist.includes(p.id)?'❤️':'🤍'}
      </button>
    </div>
    `;
  });
  document.getElementById('productGrid').innerHTML=html;
}

// RENDER CART
function renderCart(){
  let html='';
  let total=0;

  for(let id in state.cart){
    let p=state.products.find(x=>x.id==id);
    let qty=state.cart[id];
    total+=p.price*qty;

    html+=`
    <div>
      ${p.title} x ${qty}
      <button onclick="state.cart[${id}]--; if(state.cart[${id}]<=0) delete state.cart[${id}]; saveCart()">-</button>
    </div>
    `;
  }

  document.getElementById('cartList').innerHTML=html;
  document.getElementById('subtotal').innerText='₹'+total;
}

// CHECKOUT
document.getElementById('checkoutBtn').addEventListener('click', ()=>{
  if(Object.keys(state.cart).length===0){
    alert('Cart empty!');
    return;
  }

  let id=Math.floor(Math.random()*100000);

  document.body.innerHTML=`
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column">
      <h1>🎉 Order Success</h1>
      <p>Order ID: #${id}</p>
      <button onclick="location.reload()">Back</button>
    </div>
  `;
});

// INIT
renderProducts();
renderCart();

</script>

</body>
</html>
